<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infield</title>

    <!--
      FOUT guard — runs SYNCHRONOUSLY before React mounts.

      Reads the pre-derived CSS variable bag that ThemeProvider wrote to
      localStorage on the previous session and applies it directly to the
      root element. Without this, the LoadingScreen flashes default colors
      for ~100-300ms before React + ThemeProvider hydrate.

      Version-gated: EXPECTED_SCHEMA_VERSION must match the number in
      `src/theme/themeStorage.ts → SCHEMA_VERSION`. Any mismatched payload
      is cleared from both storage keys so returning users after a preset
      rewrite (e.g. Sovereign Glass migration) don't flash the stale DNA.

      This script MUST NOT import from src/theme/ — it runs before the module
      graph loads. It consumes the pre-derived `vars` map keyed by `--kebab`
      property names; derivation logic stays in `tokens.ts`. Keep the shape
      contract (`{ version, vars, mode }`) in sync with
      `themeStorage.ts → writeLocalVars`.
    -->
    <script>
      (function () {
        var EXPECTED_SCHEMA_VERSION = 2;
        var VARS_KEY = 'infield:theme:vars';
        var STATE_KEY = 'infield:theme:state';
        try {
          var raw = localStorage.getItem(VARS_KEY);
          if (!raw) return;
          var data = JSON.parse(raw);
          if (!data || typeof data !== 'object' || data.version !== EXPECTED_SCHEMA_VERSION) {
            // Stale schema — drop both blobs so ThemeProvider hydrates the
            // default preset on mount instead of reviving dead vars.
            try { localStorage.removeItem(VARS_KEY); } catch (_e) {}
            try { localStorage.removeItem(STATE_KEY); } catch (_e) {}
            return;
          }
          var root = document.documentElement;
          var vars = data.vars;
          if (vars && typeof vars === 'object') {
            for (var k in vars) {
              if (
                Object.prototype.hasOwnProperty.call(vars, k) &&
                k.indexOf('--') === 0 &&
                typeof vars[k] === 'string'
              ) {
                root.style.setProperty(k, vars[k]);
              }
            }
          }
          if (data.mode === 'light' || data.mode === 'dark') {
            root.setAttribute('data-theme-mode', data.mode);
          }
        } catch (e) {
          /* Corrupt storage — fall back to CSS defaults. */
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Inter includes weight 100 (thin) and 200 (extralight) so the
      LoadingScreen wordmark renders at the intended fw 100 instead of
      falling back to 400 / regular. Without these weights the "Infield"
      cinematic wordmark reads as ordinary sans-serif text.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <!-- Required by @glideapps/glide-data-grid: cell overlay editor portals here -->
    <div id="portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
