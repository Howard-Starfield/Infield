<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infield</title>

    <!--
      Theme-module FOUT guard removed in H1 (theme module deleted). All
      tokens now live statically in src/App.css :root, so there's
      nothing to hydrate from localStorage before React mounts. This
      script also defensively clears any stale theme localStorage keys
      and any inline CSS variables the old script may have written on a
      previous boot — without this, light-theme IRS colors persist as
      `style="..."` on <html> and shadow the HerOS dark tokens.
    -->
    <script>
      (function () {
        try {
          localStorage.removeItem('infield:theme:vars');
          localStorage.removeItem('infield:theme:state');
        } catch (_e) {}
        try {
          var root = document.documentElement;
          var inline = root.getAttribute('style');
          if (inline && inline.indexOf('--') !== -1) {
            // Stale custom-property declarations from the old FOUT
            // script. Strip them; CSS :root values take over.
            root.removeAttribute('style');
          }
          if (root.hasAttribute('data-theme-mode')) {
            root.removeAttribute('data-theme-mode');
          }
        } catch (_e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Inter includes weight 100 (thin) and 200 (extralight) so the
      LoadingScreen wordmark renders at the intended fw 100 instead of
      falling back to 400 / regular. Without these weights the "Infield"
      cinematic wordmark reads as ordinary sans-serif text.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <!-- Required by @glideapps/glide-data-grid: cell overlay editor portals here -->
    <div id="portal"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
