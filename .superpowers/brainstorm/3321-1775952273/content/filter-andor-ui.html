<h2>New Feature: Filter Groups with AND / OR logic</h2>
<p class="subtitle">Multiple filter groups — each group is AND, groups are OR (Notion-style)</p>

<h3>Filter bar with grouped filters</h3>
<div class="mockup">
  <div class="mockup-body" style="font-family: system-ui; background: #f7f6f3; padding: 12px; border-radius: 6px;">
    <div style="background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 12px; display: flex; flex-direction: column; gap: 6px;">
      <div style="display: flex; gap: 6px; align-items: center; flex-wrap: wrap;">
        <span style="font-size: 11px; color: #888;">[Filter ▼]</span>
        <span style="font-size: 11px; color: #888;">[Sort ▼]</span>
        <button style="font-size: 11px; background: none; border: 1px dashed #ccc; border-radius: 4px; padding: 3px 10px; color: #888; cursor: pointer; margin-left: auto;">+ Add filter</button>
      </div>
      <!-- Filter group 1 -->
      <div style="background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 10px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
        <div style="background: #e8f0fe; color: #1a73e8; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; cursor: pointer;">AND ▼</div>
        <span style="font-size: 11px; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 3px 8px; cursor: pointer;">Status</span>
        <span style="font-size: 11px; color: #888;">is</span>
        <span style="font-size: 11px; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 3px 8px; cursor: pointer;">In Progress</span>
        <button style="background: none; border: none; color: #aaa; cursor: pointer; font-size: 11px; margin-left: auto;">✕</button>
      </div>
      <!-- OR divider -->
      <div style="text-align: center; position: relative;">
        <div style="border-top: 1px dashed #ccc; margin-bottom: -10px;">&nbsp;</div>
        <span style="background: white; font-size: 10px; color: #888; padding: 0 8px; position: relative;">OR</span>
      </div>
      <!-- Filter group 2 -->
      <div style="background: #f9f9f9; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 10px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
        <div style="background: #e8f0fe; color: #1a73e8; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; cursor: pointer;">AND ▼</div>
        <span style="font-size: 11px; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 3px 8px; cursor: pointer;">Priority</span>
        <span style="font-size: 11px; color: #888;">is</span>
        <span style="font-size: 11px; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 3px 8px; cursor: pointer;">High</span>
        <span style="font-size: 11px; color: #888; margin-left: 4px;">and</span>
        <span style="font-size: 11px; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 3px 8px; cursor: pointer;">Due date</span>
        <span style="font-size: 11px; color: #888;">before</span>
        <span style="font-size: 11px; background: white; border: 1px solid #ddd; border-radius: 4px; padding: 3px 8px; cursor: pointer;">Apr 20</span>
        <button style="background: none; border: none; color: #aaa; cursor: pointer; font-size: 11px; margin-left: auto;">✕</button>
      </div>
    </div>
  </div>
</div>

<h3>AND / OR toggle popover</h3>
<div class="mockup">
  <div class="mockup-body" style="font-family: system-ui; background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); max-width: 160px;">
    <div style="font-size: 11px; font-weight: 600; margin-bottom: 8px;">GROUP LOGIC</div>
    <div style="display: flex; flex-direction: column; gap: 4px;">
      <button style="padding: 6px 10px; background: #e8f0fe; color: #1a73e8; border: 1px solid #1a73e8; border-radius: 4px; font-size: 11px; text-align: left; cursor: pointer;">AND — all must match</button>
      <button style="padding: 6px 10px; background: white; color: #333; border: 1px solid #ddd; border-radius: 4px; font-size: 11px; text-align: left; cursor: pointer;">OR — any can match</button>
    </div>
  </div>
</div>
